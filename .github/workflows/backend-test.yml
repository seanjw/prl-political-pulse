name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'prl-backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'prl-backend/**'

defaults:
  run:
    working-directory: prl-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --exclude "infra/cdk.out"

      - name: Ruff format check
        run: ruff format --check . --exclude "infra/cdk.out"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  cdk-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          pip install -r infra/requirements.txt

      - name: CDK Diff
        id: diff
        working-directory: prl-backend/infra
        run: |
          cdk diff --all 2>&1 | tee /tmp/cdk-diff.txt || true

      - name: Post CDK diff as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/cdk-diff.txt', 'utf8');
            const body = `### CDK Diff\n\`\`\`\n${diff.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
