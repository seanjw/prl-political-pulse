name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'prl-frontend/src/**'
      - 'prl-frontend/public/**'
      - 'prl-frontend/package.json'
      - 'prl-frontend/vite.config.ts'
      - 'prl-frontend/index.html'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: prl-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prl-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_API_URL: ${{ secrets.VITE_ADMIN_API_URL }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "data/*" \
            --exclude "toplines/*" \
            --exclude "news/*" \
            --exclude "ai/*" \
            --exclude "files/*" \
            --exclude "primary/images/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"

      - name: Run E2E smoke tests
        run: npx playwright install --with-deps chromium && npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://americaspoliticalpulse.com
