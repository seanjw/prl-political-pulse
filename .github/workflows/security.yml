name: Security Scan

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8 AM UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prl-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: npm audit
        run: npm audit --audit-level=high || true

  pip-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prl-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          for req in $(find . -name "requirements*.txt" -not -path "*/cdk.out/*"); do
            echo "Auditing $req..."
            pip-audit -r "$req" --ignore-vuln PYSEC-0000 || true
          done

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run gitleaks
        run: ./gitleaks detect --source . --verbose || true
