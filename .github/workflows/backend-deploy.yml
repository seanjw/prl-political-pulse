name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'prl-backend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: prl-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in prl-api prl-batch-light prl-survey-processor; do
            aws ecr describe-repositories --repository-names "$repo" 2>/dev/null || \
              aws ecr create-repository --repository-name "$repo" --image-scanning-configuration scanOnPush=true
          done

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f docker/Dockerfile.api -t $ECR_REGISTRY/prl-api:${{ github.sha }} -t $ECR_REGISTRY/prl-api:latest .
          docker push $ECR_REGISTRY/prl-api --all-tags

      - name: Build and push Batch Light image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f docker/Dockerfile.batch-light -t $ECR_REGISTRY/prl-batch-light:${{ github.sha }} -t $ECR_REGISTRY/prl-batch-light:latest .
          docker push $ECR_REGISTRY/prl-batch-light --all-tags

      - name: Build and push Survey Processor image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f docker/Dockerfile.survey-processor -t $ECR_REGISTRY/prl-survey-processor:${{ github.sha }} -t $ECR_REGISTRY/prl-survey-processor:latest .
          docker push $ECR_REGISTRY/prl-survey-processor --all-tags

      - name: Install CDK
        run: |
          npm install -g aws-cdk
          pip install -r infra/requirements.txt

      - name: CDK Deploy
        working-directory: prl-backend/infra
        run: cdk deploy --all --require-approval never
