name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'prl-frontend/src/**'
      - 'prl-frontend/e2e/**'
      - 'prl-frontend/package.json'
      - 'prl-frontend/tsconfig*.json'
      - 'prl-frontend/vite.config.ts'
      - 'prl-frontend/eslint.config.js'
      - 'prl-frontend/playwright.config.ts'
  pull_request:
    branches: [main]
    paths:
      - 'prl-frontend/src/**'
      - 'prl-frontend/e2e/**'
      - 'prl-frontend/package.json'
      - 'prl-frontend/tsconfig*.json'
      - 'prl-frontend/vite.config.ts'
      - 'prl-frontend/eslint.config.js'
      - 'prl-frontend/playwright.config.ts'

defaults:
  run:
    working-directory: prl-frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prl-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prl-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc -b --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prl-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prl-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prl-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://americaspoliticalpulse.com
